name: Multi-Market T+1 Prediction

on:
  schedule:
    # 工作日北京时间 ~16:30 (UTC 8:30)
    - cron: '30 8 * * 1-5'
  workflow_dispatch:

jobs:
  predict:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Create dirs
        run: mkdir -p outputs logs data/cache reports

      - name: Run multi-market prediction
        env:
          PYTHONUNBUFFERED: "1"
          ALPHA_VANTAGE_KEY: ${{ secrets.ALPHA_VANTAGE_KEY }}
        run: python scripts/daily_multi_predict.py

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: predictions-${{ github.run_number }}
          path: |
            outputs/
            logs/
            reports/
          retention-days: 30

      - name: Commit results
        if: github.event_name == 'schedule'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add outputs/*.csv logs/*.log reports/ || true
          git commit -m "🤖 Multi-market T+1 update $(date +'%Y-%m-%d')" || true
          git push origin HEAD:main || true
