name: 📈 T+1 Prediction (13:30 → 14:00 Buy Signal)

on:
  schedule:
    # CST 13:30 = UTC 05:30 (weekdays only)
    - cron: '30 5 * * 1-5'
  workflow_dispatch:

env:
  PYTHONUNBUFFERED: '1'

jobs:
  predict:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install system dependencies (baostock)
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq libomp-dev 2>/dev/null || true

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip wheel setuptools
          pip install -r requirements.txt
          pip install xgboost  # for ensemble stacking

      - name: Download previous model cache (if any)
        uses: actions/download-artifact@v4
        with:
          name: model-cache
          path: data/cache/
          run-id: ${{ github.run_id }}
        continue-on-error: true

      - name: Run T+1 multi-market prediction
        env:
          ALPHA_VANTAGE_KEY: ${{ secrets.ALPHA_VANTAGE_KEY }}
          MARKETAUX_KEY: ${{ secrets.MARKETAUX_KEY }}
        run: |
          mkdir -p outputs logs reports data/cache
          python scripts/daily_multi_predict.py

      - name: Upload prediction CSV
        uses: actions/upload-artifact@v4
        with:
          name: prediction-results
          path: outputs/multi_t1_pred_*.csv
          retention-days: 7

      - name: Upload model cache (reuse next run)
        uses: actions/upload-artifact@v4
        with:
          name: model-cache
          path: data/cache/
          retention-days: 30
          overwrite: true

      - name: Show predictions in job summary
        if: always()
        run: |
          echo "## 📊 今日预测 (14:00买入信号)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          for f in outputs/multi_t1_pred_*.csv; do
            if [ ! -f "$f" ]; then continue; fi
            echo "### 预测文件: \`$f\`" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo '| # | 市场 | 代码 | 预期收益 |' >> $GITHUB_STEP_SUMMARY
            echo '|---|---|---|---|' >> $GITHUB_STEP_SUMMARY
            awk -F',' 'NR>1 {printf "| %s | %s | %s | %s |\n", $2, $1, $3, $4}' "$f" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          done
