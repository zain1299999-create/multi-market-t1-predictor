# Multi-market T+1 predictor config
markets:
  CN:
    tickers: []  # 自动从 hs300/zz500 获取
    rules:
      price_limit: 0.10
      t_plus: 1
      st_filter: true
      limit_up_filter: true
      min_volume_cny: 10000000
  US:
    tickers: [AAPL, MSFT, GOOGL, AMZN, NVDA, TSLA, META, AVGO, JPM]
    rules:
      price_limit: null
      t_plus: 1
      min_volume_usd: 1000000
  KR:
    tickers: [005930.KS, 000660.KS, 035420.KQ]
    rules:
      price_limit: 0.30
      t_plus: 2
      min_volume_krw: 500000000
  JP:
    tickers: [7203.T, 9984.T, 6758.T]
    rules:
      price_limit: 0.20
      t_plus: 2
      min_volume_jpy: 10000000

global:
  top_k: 10
  train_years: 2
  forward_days: 1
  min_pred_prob: 0.55
